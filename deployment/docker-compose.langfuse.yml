# Dokus Docker Compose - Langfuse Overlay (AI Observability)
# Adds self-hosted Langfuse v3 for Koog agent tracing.
#
# Usage (combine with any profile):
#   docker compose -f docker-compose.pro.yml -f docker-compose.langfuse.yml up -d
#   docker compose -f docker-compose.lite.yml -f docker-compose.langfuse.yml up -d
#
# Langfuse UI accessible at: http://<host>:8000/langfuse

# Shared environment for langfuse-web and langfuse-worker (YAML anchor)
x-langfuse-env: &langfuse-env
  DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-postgres:5432/langfuse
  SALT: ${LANGFUSE_SALT}
  ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
  TELEMETRY_ENABLED: "false"
  # ClickHouse
  CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
  CLICKHOUSE_URL: http://langfuse-clickhouse:8123
  CLICKHOUSE_USER: langfuse
  CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
  CLICKHOUSE_CLUSTER_ENABLED: "false"
  # Redis
  REDIS_HOST: langfuse-redis
  REDIS_PORT: "6379"
  REDIS_AUTH: ${LANGFUSE_REDIS_PASSWORD}
  # S3 (MinIO) - events
  LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
  LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: langfuse
  LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
  LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
  LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
  # S3 (MinIO) - media
  LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
  LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: langfuse
  LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${LANGFUSE_MINIO_PASSWORD}
  LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
  LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
  LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/

x-langfuse-depends: &langfuse-depends
  langfuse-postgres:
    condition: service_healthy
  langfuse-clickhouse:
    condition: service_healthy
  langfuse-redis:
    condition: service_healthy
  langfuse-minio:
    condition: service_healthy

services:
  # ==========================================================================
  # LANGFUSE INFRASTRUCTURE (all internal, not exposed)
  # ==========================================================================
  langfuse-postgres:
    image: postgres:17-alpine
    container_name: dokus-langfuse-postgres
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      TZ: UTC
      PGTZ: UTC
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    networks:
      - dokus-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse -d langfuse"]
      interval: 3s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  langfuse-clickhouse:
    image: clickhouse/clickhouse-server
    container_name: dokus-langfuse-clickhouse
    user: "101:101"
    environment:
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: langfuse
      CLICKHOUSE_PASSWORD: ${LANGFUSE_CLICKHOUSE_PASSWORD}
    volumes:
      - langfuse-clickhouse-data:/var/lib/clickhouse
      - langfuse-clickhouse-logs:/var/log/clickhouse-server
    networks:
      - dokus-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  langfuse-redis:
    image: redis:7
    container_name: dokus-langfuse-redis
    command: >
      --requirepass ${LANGFUSE_REDIS_PASSWORD}
      --maxmemory-policy noeviction
    volumes:
      - langfuse-redis-data:/data
    networks:
      - dokus-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  langfuse-minio:
    image: minio/minio:latest
    container_name: dokus-langfuse-minio
    entrypoint: sh
    command: -c 'mkdir -p /data/langfuse && minio server --address ":9000" --console-address ":9001" /data'
    environment:
      MINIO_ROOT_USER: langfuse
      MINIO_ROOT_PASSWORD: ${LANGFUSE_MINIO_PASSWORD}
    volumes:
      - langfuse-minio-data:/data
    networks:
      - dokus-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 3s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ==========================================================================
  # LANGFUSE APPLICATION
  # ==========================================================================
  langfuse-web:
    image: langfuse/langfuse:3
    container_name: dokus-langfuse-web
    depends_on: *langfuse-depends
    environment:
      <<: *langfuse-env
      NEXTAUTH_SECRET: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3000}
      # Auto-provisioned org, project, and admin user
      LANGFUSE_INIT_ORG_ID: dokus
      LANGFUSE_INIT_ORG_NAME: Dokus
      LANGFUSE_INIT_PROJECT_ID: dokus-ai
      LANGFUSE_INIT_PROJECT_NAME: "Dokus Document Processing"
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_EMAIL:-admin@dokus.tech}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_PASSWORD:-changeme}
      LANGFUSE_INIT_USER_NAME: Admin
    ports:
      - "3000:3000"
    networks:
      - dokus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G

  langfuse-worker:
    image: langfuse/langfuse-worker:3
    container_name: dokus-langfuse-worker
    depends_on: *langfuse-depends
    environment:
      <<: *langfuse-env
    networks:
      - dokus-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  # ==========================================================================
  # DOKUS SERVER OVERRIDE (enables Langfuse tracing)
  # ==========================================================================
  dokus-server:
    environment:
      LANGFUSE_ENABLED: "true"
      LANGFUSE_HOST: http://langfuse-web:3000
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}

networks:
  dokus-network:

volumes:
  langfuse-postgres-data:
  langfuse-clickhouse-data:
  langfuse-clickhouse-logs:
  langfuse-redis-data:
  langfuse-minio-data:
